services:
  localstack:
    image: localstack/localstack:3.8.0
    container_name: coffee-senja-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=1
    # LocalStack S3/SQS for free tier doesn't need persistence folder as much
    # but we keep it for completeness if needed
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: coffee-senja-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - "./.dynamodb_data:/data"

  app:
    build: .
    container_name: coffee-senja-localstack-app
    ports:
      - "5000:5000"
    depends_on:
      - localstack
      - dynamodb
    volumes:
      # Live edit: perubahan file di VS Code langsung masuk ke container /app
      - .:/app
    environment:
      - APP_NAME=Coffee Senja
      - APP_SECRET_KEY=coffee-senja-secret
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
      - DYNAMODB_ENDPOINT_URL=http://dynamodb:8000
      - S3_BUCKET_NAME=coffee-senja-localstack-receipts
      - SQS_QUEUE_NAME=coffee-senja-localstack-orders
      - MENU_TABLE_NAME=CoffeeSenjaLocalstackMenu
      - ORDERS_TABLE_NAME=CoffeeSenjaLocalstackOrders
      - USERS_TABLE_NAME=CoffeeSenjaLocalstackUsers
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_PASSWORD=admin123

# Persistence moved to host-mapped directory ./.localstack_data
